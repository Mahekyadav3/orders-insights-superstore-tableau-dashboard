<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Superstore Sales Insights Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      text-align: center;
    }
    .dashboard-container {
      width: 100%;
      max-width: 1200px;
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <h1>🛒 Superstore Sales Insights Dashboard</h1>

  <div class="dashboard-container">

    <!-- Tableau Embed Code -->
    <div class='tableauPlaceholder' id='viz_superstore' style='position: relative'>

      <noscript>
        <a href='#'>
          <img
            alt='Superstore Sales Insights Dashboard'
            src='https://public.tableau.com/static/images/Or/OrderInsightsfromSuperstore/SuperstoreSalesInsightsDashboard/1_rss.png'
            style='border: none'
          />
        </a>
      </noscript>

      <object class='tableauViz' style='display:none;'>
        <param name='host_url'             value='https%3A%2F%2Fpublic.tableau.com%2F' />
        <param name='embed_code_version'   value='3' />
        <param name='site_root'            value='' />
        <param name='name'                 value='OrderInsightsfromSuperstore/SuperstoreSalesInsightsDashboard' />
        <param name='tabs'                 value='no' />
        <param name='toolbar'              value='yes' />
        <param name='static_image'         value='https://public.tableau.com/static/images/Or/OrderInsightsfromSuperstore/SuperstoreSalesInsightsDashboard/1.png' />
        <param name='animate_transition'   value='yes' />
        <param name='display_static_image' value='yes' />
        <param name='display_spinner'      value='yes' />
        <param name='display_overlay'      value='yes' />
        <param name='display_count'        value='yes' />
        <param name='language'             value='en-US' />
      </object>

    </div>

    <script type='text/javascript'>
      var divElement = document.getElementById('viz_superstore');
      var vizElement = divElement.getElementsByTagName('object')[0];

      if (divElement.offsetWidth > 800) {
        vizElement.style.width  = '100%';
        vizElement.style.height = (divElement.offsetWidth * 0.75) + 'px';
      } else if (divElement.offsetWidth > 500) {
        vizElement.style.width  = '100%';
        vizElement.style.height = (divElement.offsetWidth * 0.75) + 'px';
      } else {
        vizElement.style.width  = '100%';
        vizElement.style.height = '2127px';
      }

      var scriptElement = document.createElement('script');
      scriptElement.src = 'https://public.tableau.com/javascripts/api/viz_v1.js';
      vizElement.parentNode.insertBefore(scriptElement, vizElement);
    </script>

  </div>

</body>
</html>
